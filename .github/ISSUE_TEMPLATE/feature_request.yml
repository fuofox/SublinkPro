name: 功能请求 (Feature Request)
description: 为本项目提出建议。Suggest an idea for this project.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您建议新功能！
        Thanks for suggesting a new feature!
  - type: textarea
    id: scenario
    attributes:
      label: 场景和背景 (Scenario and Context)
      description: |
        这个功能解决了什么问题或适用于什么场景？您的功能请求是否与某个问题相关？请描述。
        What problem or scenario does this feature address? If it is related to a problem, please describe it.
      placeholder: |
        我希望在以下场景中...
        I would like this for...
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 具体说明 (Detailed Description)
      description: |
        请描述您想要的解决方案。
        Describe the solution you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 (Alternatives Considered)
      description: |
        请描述您考虑过的替代方案。
        Describe alternatives you have considered.
