name: Bug 报告 (Bug Report)
description: 提交报告帮助我们改进。Create a report to help us improve.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间填写此 Bug 报告！
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: 版本 (Version)
      description: |
        您运行的软件版本是多少？
        What version of the software are you running?
      placeholder: 例如 v1.0.0 (e.g. v1.0.0)
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式 (Deployment Method)
      description: |
        您是如何部署应用程序的？
        How are you deploying the application?
      options:
        - Docker
        - Linux
        - Windows
        - macOS
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug 描述 (Bug Description)
      description: |
        请清晰简洁地描述 Bug 是什么。
        Please clearly and concisely describe what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤 (Reproduction Steps)
      description: |
        请填写复现问题的步骤：
        1. 前往 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误

        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图 (Screenshots)
      description: |
        如果适用，请添加截图以帮助说明您的问题。
        If applicable, add screenshots to help explain your problem.
  - type: textarea
    id: logs
    attributes:
      label: 日志 (Logs)
      description: |
        请复制并粘贴任何相关的日志输出。
        Please copy and paste any relevant log output.
      render: shell
