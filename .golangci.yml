version: "2"

run:
  timeout: 8m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - staticcheck
    - unconvert
    - unused
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      verbose: true
      disable-default-exclusions: true
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*strings.Builder).Write
        - (*strings.Builder).WriteByte
        - (*strings.Builder).WriteRune
        - (*strings.Builder).WriteString
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteByte
        - (*bytes.Buffer).WriteRune
        - (*bytes.Buffer).WriteString
        - (io.Writer).Write
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
        - io/ioutil.ReadFile
    gosec:
      severity: high
      confidence: high
      excludes:
        - G103
        - G109
        - G115
        - G201
        - G202
        - G301
        - G302
        - G306
        - G404
    ineffassign:
      check-escaping-errors: true
    staticcheck:
      checks:
        - all
        # 先保留少量高噪音项的排除，便于渐进收紧。
        - '-ST1000'
        - '-ST1003'
        - '-ST1020'
        - '-ST1021'
        - '-ST1022'
      dot-import-whitelist:
        - fmt
      initialisms:
        - ACL
        - API
        - ASCII
        - CPU
        - CSS
        - DNS
        - EOF
        - GUID
        - HTML
        - HTTP
        - HTTPS
        - ID
        - IP
        - JSON
        - QPS
        - RAM
        - RPC
        - SLA
        - SMTP
        - SQL
        - SSH
        - TCP
        - TLS
        - TTL
        - UDP
        - UI
        - GID
        - UID
        - UUID
        - URI
        - URL
        - UTF8
        - VM
        - XML
        - XMPP
        - XSRF
        - XSS
        - SIP
        - RTP
        - AMQP
        - DB
        - TS
      http-status-code-whitelist:
        - "200"
        - "400"
        - "404"
        - "500"
    unused:
      field-writes-are-uses: true
      post-statements-are-reads: true
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: false
      generated-is-used: true
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: false
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
        - pattern: 'a[b:len(a)]'
          replacement: 'a[b:]'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
